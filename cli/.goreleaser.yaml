version: 2
project_name: lootprotocol

builds:
  - main: ./cmd/lootprotocol
    binary: lootprotocol
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X 'github.com/lootprotocol/lootprotocol/internal/auth.defaultCognitoDomain={{ .Env.COGNITO_DOMAIN }}'
      - -X 'github.com/lootprotocol/lootprotocol/internal/auth.defaultCognitoClientID={{ .Env.COGNITO_CLIENT_ID }}'
      - -X 'github.com/lootprotocol/lootprotocol/internal/config.defaultAPIURL={{ .Env.API_URL }}'

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

brews:
  - name: lootprotocol
    repository:
      owner: lootprotocol
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://lootprotocol.com"
    description: "CLI for the Loot Protocol AI Extension Marketplace"
    license: "MIT"
    install: |
      bin.install "lootprotocol"
    test: |
      system "#{bin}/lootprotocol", "--version"
