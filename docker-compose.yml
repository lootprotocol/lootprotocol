services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lootprotocol
      POSTGRES_PASSWORD: lootprotocol
      POSTGRES_DB: lootprotocol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lootprotocol"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set minio http://minio:9000 minioadmin minioadmin;
      mc mb minio/lootprotocol-packages --ignore-existing;
      mc anonymous set download minio/lootprotocol-packages;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
